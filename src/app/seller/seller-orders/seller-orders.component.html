<div class="orders-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Incoming Commands (Orders)</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div *ngIf="loading" class="loading-spinner">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <table mat-table [dataSource]="orders" *ngIf="!loading" class="mat-elevation-z8">
        <!-- Order Number Column -->
        <ng-container matColumnDef="orderNumber">
          <th mat-header-cell *matHeaderCellDef> Order # </th>
          <td mat-cell *matCellDef="let order"> {{order.orderNumber}} </td>
        </ng-container>

        <!-- Customer Column -->
        <ng-container matColumnDef="customer">
          <th mat-header-cell *matHeaderCellDef> Customer </th>
          <td mat-cell *matCellDef="let order"> {{order.customer.firstName}} {{order.customer.lastName}} </td>
        </ng-container>

        <!-- Date Column -->
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef> Date </th>
          <td mat-cell *matCellDef="let order"> {{order.orderDate | date:'medium'}} </td>
        </ng-container>

        <!-- Total Column -->
        <ng-container matColumnDef="total">
          <th mat-header-cell *matHeaderCellDef> Total </th>
          <td mat-cell *matCellDef="let order"> {{order.totalAmount | currency}} </td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> Status </th>
          <td mat-cell *matCellDef="let order">
            <mat-chip-listbox>
              <mat-chip-option [color]="getStatusColor(order.status)" selected>
                {{order.status}}
              </mat-chip-option>
            </mat-chip-listbox>
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Actions </th>
          <td mat-cell *matCellDef="let order">
            <ng-container *ngIf="order.status === 'PENDING'||order.status === 'CONFIRMED'||order.status === 'PAID'||order.status === 'PROCESSING'||order.status === 'SHIPPED'">
              <button mat-icon-button color="primary" (click)="confirmOrder(order.id)" title="Confirm Order">
                <mat-icon>check_circle</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="rejectOrder(order.id)" title="Reject Order">
                <mat-icon>cancel</mat-icon>
              </button>
            </ng-container>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <div *ngIf="!loading && orders.length === 0" class="no-orders">
        <p>No commands found.</p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
