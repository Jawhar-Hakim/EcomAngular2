<div class="container" *ngIf="currentUser$ | async as user; else notLoggedIn">
  <mat-card class="profile-card">
    <mat-card-header>
      <div mat-card-avatar class="avatar-icon">
        <mat-icon color="primary">account_circle</mat-icon>
      </div>
      <mat-card-title>{{user.firstName}} {{user.lastName}}</mat-card-title>
      <mat-card-subtitle>{{user.role}}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <mat-list>
        <mat-list-item>
          <mat-icon matListItemIcon>email</mat-icon>
          <div matListItemTitle>Email</div>
          <div matListItemLine>{{user.email}}</div>
        </mat-list-item>
        <mat-list-item>
          <mat-icon matListItemIcon>event</mat-icon>
          <div matListItemTitle>Member Since</div>
          <div matListItemLine>{{user.createdAt | date:'mediumDate'}}</div>
        </mat-list-item>
        <mat-list-item>
          <mat-icon matListItemIcon>verified_user</mat-icon>
          <div matListItemTitle>Status</div>
          <div matListItemLine>{{user.active ? 'Active Account' : 'Inactive'}}</div>
        </mat-list-item>
      </mat-list>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-button color="warn" (click)="logout()">LOGOUT</button>
    </mat-card-actions>
  </mat-card>
</div>

<ng-template #notLoggedIn>
  <div class="container">
    <mat-card class="profile-card">
      <mat-card-content>
        <p>Please login to view your profile.</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-raised-button color="primary" routerLink="/login">LOGIN</button>
      </mat-card-actions>
    </mat-card>
  </div>
</ng-template>
