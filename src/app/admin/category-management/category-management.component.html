<div class="container">
  <h1>Category Management</h1>

  <div class="management-grid">
    <!-- Category Form -->
    <mat-card class="form-card">
      <mat-card-header>
        <mat-card-title>{{isEditMode ? 'Edit' : 'Add'}} Category</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Name</mat-label>
            <input matInput formControlName="name" placeholder="Category name">
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Description</mat-label>
            <textarea matInput formControlName="description" placeholder="Category description"></textarea>
          </mat-form-field>

          <div class="form-actions">
            <button mat-button type="button" (click)="resetForm()">RESET</button>
            <button mat-raised-button color="primary" type="submit" [disabled]="categoryForm.invalid">
              {{isEditMode ? 'UPDATE' : 'CREATE'}}
            </button>
          </div>
        </form>
      </mat-card-content>
    </mat-card>

    <!-- Categories Table -->
    <mat-card class="table-card">
      <div *ngIf="loading" class="loading-shade">
        <mat-spinner></mat-spinner>
      </div>

      <table mat-table [dataSource]="categories" *ngIf="!loading">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let cat"> {{cat.id}} </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef> Name </th>
          <td mat-cell *matCellDef="let cat"> {{cat.name}} </td>
        </ng-container>

        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef> Description </th>
          <td mat-cell *matCellDef="let cat"> {{cat.description}} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Actions </th>
          <td mat-cell *matCellDef="let cat">
            <button mat-icon-button color="primary" (click)="editCategory(cat)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteCategory(cat.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </mat-card>
  </div>
</div>
