<div class="container">
  <h1>Product Catalog</h1>
  
  <div class="filters-container">
    <mat-form-field appearance="outline">
      <mat-label>Search</mat-label>
      <input matInput [(ngModel)]="filters.keyword" (ngModelChange)="onFilterChange()" placeholder="Search products...">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Category</mat-label>
      <mat-select [(ngModel)]="filters.categoryId" (selectionChange)="onFilterChange()">
        <mat-option [value]="null">All Categories</mat-option>
        <mat-option *ngFor="let cat of categories" [value]="cat.id">
          {{cat.name}}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Min Price</mat-label>
      <input matInput type="number" [(ngModel)]="filters.minPrice" (ngModelChange)="onFilterChange()">
      <span matPrefix>$&nbsp;</span>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Max Price</mat-label>
      <input matInput type="number" [(ngModel)]="filters.maxPrice" (ngModelChange)="onFilterChange()">
      <span matPrefix>$&nbsp;</span>
    </mat-form-field>
  </div>

  <mat-spinner *ngIf="loading"></mat-spinner>

  <div class="product-grid" *ngIf="!loading">
    <mat-card *ngFor="let product of products" class="product-card">
      <img mat-card-image [src]="productService.getImageUrl(product.images?.[0]) || 'assets/placeholder.png'" alt="{{product.name}}">
      <mat-card-header>
        <mat-card-title>{{product.name}}</mat-card-title>
        <mat-card-subtitle>{{product.price | currency}}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p class="description">{{product.description}}</p>
        <p *ngIf="product.stock > 0">In Stock: {{product.stock}}</p>
        <p *ngIf="product.stock <= 0" class="out-of-stock">Out of Stock</p>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-raised-button color="accent" (click)="addToCart(product)" [disabled]="product.stock <= 0">
          <mat-icon>add_shopping_cart</mat-icon> ADD TO CART
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
