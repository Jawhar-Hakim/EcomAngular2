<div class="auth-wrapper">
  <div class="auth-container register-container">
    <mat-card class="auth-card">
      <div class="auth-header">
        <mat-icon class="auth-icon">person_add</mat-icon>
        <h1>Create Account</h1>
        <p>Join our community and start shopping today</p>
      </div>

      <mat-card-content>
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>First Name</mat-label>
              <input matInput formControlName="firstName" placeholder="John">
              <mat-error *ngIf="registerForm.get('firstName')?.hasError('required')">Required</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Last Name</mat-label>
              <input matInput formControlName="lastName" placeholder="Doe">
              <mat-error *ngIf="registerForm.get('lastName')?.hasError('required')">Required</mat-error>
            </mat-form-field>
          </div>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email Address</mat-label>
            <input matInput type="email" formControlName="email" placeholder="email@example.com">
            <mat-icon matPrefix>email</mat-icon>
            <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Email is required</mat-error>
            <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Invalid email</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="Min 6 characters">
            <mat-icon matPrefix>lock</mat-icon>
            <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
              <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Password is required</mat-error>
            <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Too short</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Register as</mat-label>
            <mat-select formControlName="role">
              <mat-option *ngFor="let role of roles" [value]="role">
                {{role | titlecase}}
              </mat-option>
            </mat-select>
            <mat-icon matPrefix>assignment_ind</mat-icon>
          </mat-form-field>

          <button mat-raised-button color="primary" type="submit" class="auth-submit-btn" [disabled]="registerForm.invalid || loading">
            <mat-spinner diameter="24" *ngIf="loading"></mat-spinner>
            <span *ngIf="!loading">CREATE ACCOUNT</span>
          </button>
        </form>

        <div class="auth-footer">
          <p>Already have an account? <a routerLink="/login">Sign In</a></p>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
