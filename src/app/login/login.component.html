<div class="auth-wrapper">
  <div class="auth-container">
    <mat-card class="auth-card">
      <div class="auth-header">
        <mat-icon class="auth-icon">lock_open</mat-icon>
        <h1>Welcome Back</h1>
        <p>Please enter your credentials to access your account</p>
      </div>

      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email Address</mat-label>
            <input matInput type="email" formControlName="email" placeholder="e.g. alex@example.com">
            <mat-icon matPrefix>email</mat-icon>
            <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
            <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Please enter a valid email</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
            <mat-icon matPrefix>lock</mat-icon>
            <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
              <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
          </mat-form-field>

          <div class="form-options">
            <mat-checkbox color="primary">Remember me</mat-checkbox>
            <a routerLink="/forgot-password" class="forgot-link">Forgot password?</a>
          </div>

          <button mat-raised-button color="primary" type="submit" class="auth-submit-btn" [disabled]="loginForm.invalid || loading">
            <mat-spinner diameter="24" *ngIf="loading"></mat-spinner>
            <span *ngIf="!loading">SIGN IN</span>
          </button>
        </form>

        <div class="auth-footer">
          <p>Don't have an account? <a routerLink="/register">Create one now</a></p>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
