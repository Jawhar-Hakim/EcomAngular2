<mat-toolbar color="primary">
  <span>E-Commerce</span>
  <span class="spacer"></span>
  
  <button mat-button routerLink="/home">Home</button>

  <ng-container *ngIf="authService.currentUser | async as user">
    <button mat-button *ngIf="isSeller$ | async" routerLink="/seller/products">My Products</button>
    <button mat-button *ngIf="isSeller$ | async" routerLink="/seller/orders">Orders</button>
    <button mat-button *ngIf="isCustomer$ | async" routerLink="/customer/catalog">Shop</button>
    <button mat-button *ngIf="isCustomer$ | async" routerLink="/customer/orders">My Orders</button>
    <button mat-button *ngIf="isCustomer$ | async" routerLink="/customer/cart">
      <mat-icon [matBadge]="cartItemCount$ | async" matBadgeColor="warn">shopping_cart</mat-icon>
    </button>
    <button mat-button *ngIf="isAdmin$ | async" routerLink="/admin/users">Users</button>
    <button mat-button *ngIf="isAdmin$ | async" routerLink="/admin/categories">Categories</button>
    <button mat-button *ngIf="isAdmin$ | async" routerLink="/admin/coupons">Coupons</button>
  </ng-container>
  
  <ng-container *ngIf="!(authService.currentUser | async); else loggedIn">
    <button mat-button routerLink="/login">Login</button>
    <button mat-button routerLink="/register">Register</button>
  </ng-container>

  <ng-template #loggedIn>
    <button mat-button [matMenuTriggerFor]="menu">
      <mat-icon>person</mat-icon>
      {{ (authService.currentUser | async)?.firstName }}
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item routerLink="/user">
        <mat-icon>account_circle</mat-icon>
        <span>Profile</span>
      </button>
      <button mat-menu-item (click)="logout()">
        <mat-icon>exit_to_app</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </ng-template>
</mat-toolbar>
